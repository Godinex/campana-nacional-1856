<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Campaña Nacional 1856–1857</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #1a0f00;
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Georgia', serif;
    }
    /* Phaser monta su canvas aquí */
    #game-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    /* Todo el UI flota encima del canvas */
    #ui-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #title-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: linear-gradient(180deg, rgba(20,10,0,0.92) 0%, transparent 100%);
      padding: 10px 20px 20px;
      color: #d4a843;
      font-size: 17px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(212,168,67,0.5);
      text-align: center;
    }
    #title-bar span {
      font-size: 10px;
      color: #a07830;
      display: block;
      letter-spacing: 5px;
      margin-top: 2px;
    }
    #bonus-bank {
      position: absolute;
      top: 70px; left: 16px;
      background: rgba(15,8,0,0.88);
      border: 1px solid #5a3a10;
      border-radius: 4px;
      padding: 8px 12px;
      color: #d4a843;
      font-size: 11px;
      min-width: 150px;
    }
    #bonus-bank h3 {
      font-size: 12px; color: #f0c060;
      margin-bottom: 5px;
      border-bottom: 1px solid #5a3a10;
      padding-bottom: 3px; letter-spacing: 1px;
    }
    .bonus-item {
      display: flex; justify-content: space-between; margin: 3px 0;
    }
    .bonus-value { color: #7fc47f; font-weight: bold; }
    #hex-info {
      position: absolute;
      top: 70px; right: 16px;
      background: rgba(15,8,0,0.88);
      border: 1px solid #5a3a10;
      border-radius: 4px;
      padding: 8px 12px;
      color: #d4a843;
      font-size: 11px;
      min-width: 170px;
      display: none;
    }
    #hex-info h3 { font-size: 13px; color: #f0c060; margin-bottom: 5px; border-bottom: 1px solid #5a3a10; padding-bottom: 3px; }
    #hex-info p  { margin: 2px 0; color: #c8a060; }
    #status-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(0deg, rgba(15,8,0,0.92) 0%, transparent 100%);
      padding: 18px 16px 8px;
      color: #c8a060; font-size: 11px; letter-spacing: 1px;
      display: flex; justify-content: space-between; align-items: flex-end;
    }
    /* Log y botón tienen pointer-events propios */
    #log-panel {
      position: absolute;
      bottom: 36px; left: 16px;
      background: rgba(15,8,0,0.85);
      border: 1px solid #5a3a10; border-radius: 4px;
      padding: 6px 10px;
      min-width: 210px; max-width: 270px;
      max-height: 120px; overflow-y: auto;
      font-size: 10px; color: #a89060;
      pointer-events: auto;
    }
    #end-turn-btn {
      position: absolute;
      bottom: 36px; right: 16px;
      background: #3a1a00; border: 1px solid #d4a843; border-radius: 4px;
      color: #d4a843; font-family: Georgia, serif; font-size: 11px;
      padding: 7px 14px; cursor: pointer; letter-spacing: 1px;
      pointer-events: auto;
      transition: background 0.2s;
    }
    #end-turn-btn:hover { background: #5a2a00; }
    #turn-indicator {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(15,8,0,0.93);
      border: 2px solid #d4a843; border-radius: 6px;
      padding: 18px 36px;
      color: #d4a843; font-size: 20px;
      letter-spacing: 3px; text-align: center;
      text-transform: uppercase; display: none;
    }
    #turn-indicator span {
      display: block; font-size: 12px;
      color: #a07830; letter-spacing: 2px; margin-top: 5px;
    }
  </style>
</head>
<body>
  <!-- Phaser canvas goes here -->
  <div id="game-canvas"></div>

  <!-- UI layer on top -->
  <div id="ui-layer">
    <div id="title-bar">
      La Campaña Nacional
      <span>Centroamérica · 1856 – 1857</span>
    </div>

    <div id="bonus-bank">
      <h3>🏅 Medallero</h3>
      <div class="bonus-item"><span>Combate:</span><span class="bonus-value" id="bonus-combat">+0</span></div>
      <div class="bonus-item"><span>Movimiento:</span><span class="bonus-value" id="bonus-move">+0</span></div>
      <div class="bonus-item"><span>Estético:</span><span class="bonus-value" id="bonus-estetic">0</span></div>
      <div class="bonus-item" style="margin-top:6px;border-top:1px solid #5a3a10;padding-top:5px;">
        <span>Turno:</span><span id="turn-num" style="color:#f0c060">1</span>
      </div>
      <div class="bonus-item">
        <span>Fase:</span><span id="phase-label" style="color:#f0c060">—</span>
      </div>
      <div class="bonus-item">
        <span>Mov. restantes:</span><span class="bonus-value" id="moves-left">3</span>
      </div>
    </div>

    <div id="hex-info">
      <h3 id="hex-name">—</h3>
      <p id="hex-terrain">Terreno: —</p>
      <p id="hex-movement">Costo mov.: —</p>
      <p id="hex-note" style="font-style:italic;margin-top:4px;font-size:10px;color:#906840"></p>
    </div>

    <div id="turn-indicator">
      Turno Filibustero
      <span>Walker avanza...</span>
    </div>

    <div id="log-panel"></div>
    <button id="end-turn-btn">Terminar Movimiento</button>

    <div id="status-bar">
      <div id="status-left">Haz clic en una unidad aliada para moverla</div>
      <div id="status-right">Campaña Nacional 1856 · D20</div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
